services:
  mysql:
    image: mysql:8.4
    container_name: galaxy-elite-mysql-test
    restart: unless-stopped
    command: --log-bin-trust-function-creators=1
    environment:
      MYSQL_ROOT_PASSWORD: galaxy_root_password
      MYSQL_DATABASE: galaxy_elite_test
      MYSQL_USER: galaxy_test
      MYSQL_PASSWORD: galaxy_test_password
    ports:
      - "3307:3306"
    volumes:
      - galaxy_elite_mysql_data:/var/lib/mysql
      - ./backend/db/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ugalaxy_test", "-pgalaxy_test_password"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  galaxy_elite_mysql_data:
